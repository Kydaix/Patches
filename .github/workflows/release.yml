name: Release patch bundle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish RVP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure GitHub Packages credentials
        env:
          GH_PACKAGES_USERNAME: ${{ secrets.GH_PACKAGES_USERNAME || github.actor }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || github.token }}
        run: |
          mkdir -p ~/.gradle
          {
            echo "githubPackagesUsername=${GH_PACKAGES_USERNAME}"
            echo "githubPackagesPassword=${GH_PACKAGES_TOKEN}"
            echo "gpr.user=${GH_PACKAGES_USERNAME}"
            echo "gpr.key=${GH_PACKAGES_TOKEN}"
          } >> ~/.gradle/gradle.properties

      - name: Build bundle
        run: |
          chmod +x ./gradlew
          ./gradlew clean :patches:buildAndroid

      - name: Collect release assets
        run: |
          set -euo pipefail
          mkdir -p release

          rvp_file="$(find patches/build/libs -maxdepth 1 -type f -name '*.rvp' ! -name '*-sources.rvp' ! -name '*-javadoc.rvp' | sort | tail -n 1)"
          test -n "${rvp_file}"

          version="${GITHUB_REF_NAME#v}"
          created_at="$(date -u +'%Y-%m-%dT%H:%M:%S')"
          cp "${rvp_file}" release/revanced-instagram-patches.rvp
          cp "${rvp_file}" "release/revanced-instagram-patches-${version}.rvp"

          cat > release/revanced-instagram-patches.json <<EOF
          {
            "version": "${GITHUB_REF_NAME}",
            "created_at": "${created_at}",
            "description": "Instagram ReVanced Patches ${version}",
            "download_url": "https://github.com/Kydaix/Patches/releases/latest/download/revanced-instagram-patches.rvp"
          }
          EOF

          (cd release && sha256sum *.rvp *.json > SHA256SUMS.txt)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release/* --title "${GITHUB_REF_NAME}" --notes-file CHANGELOG.md
          fi
